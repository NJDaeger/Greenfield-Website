<!doctype html>
<html>
	<head>
		<meta content="width=device-width, initial-scale=1" name="viewport" />
		<title>Greenfield Minecraft - Map Information</title>
		<script src="https://cdn.jsdelivr.net/npm/lozad/dist/lozad.min.js"></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js" integrity="sha256-T0Vest3yCU7pafRw9r+settMBX6JkKN06dqBnpQ8d30=" crossorigin="anonymous"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
		<script src="//cdnjs.cloudflare.com/ajax/libs/ScrollMagic/2.0.7/ScrollMagic.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <link rel="icon" href="images/logo_background.png">
        <link rel="stylesheet" type="text/css" href="/css/home.css">
        <link rel="stylesheet" type="text/css" href="/css/overlay.css">
        <script src="/js/home.js"></script>
        <script src="/js/overlay.js"></script>
	</head>

    <body>
        <div class="row h-100" id="sidebar">
            <div class="col-sm-12 my-auto">
                <div class="sidebar-item active">
                    <a href="#welcome"><span>Welcome</span></a>
                </div>
                <div class="sidebar-item">
                    <a href="#project"><span>The Project</span></a>
                </div>
                <div class="sidebar-item">
                    <a href="#pack"><span>The Resource Pack</span></a>
                </div>
                <div class="sidebar-item">
                    <a href="#apply"><span>Apply</span></a> 
                </div>
            </div>
            
        </div>
        <div class="menu-slides">
            <div class="container-fluid slide" id="welcome">
                <div class="row mx-auto slide-content">
                    <h3 class="animateFirst">Welcome to</h3>
                    <h1 class="animateSecond">Greenfield</h1>
                </div>
                <img data-src="../images/skyline.jpg" alt="" class="fit-img lozad">
            </div>
            <div class="container-fluid slide" id="project">
                <div class="row mx-auto slide-content">
                    <h3 class="animateFirst">Current Map Release</h3>
                    <h1 class="animateSecond"><span style="color: slateblue">v</span> 0.5.<span style="color: slateblue">3</span></h1>
                    <div class="button container-fluid justify-content-center animateThird">
                        <a href="#">Project Page</a>
                    </div>
                </div>
                <img data-src="../images/stadium.jpg" alt="" class="fit-img lozad">
            </div>
            <div class="container-fluid slide" id="pack">
                <div class="row mx-auto slide-content">
                    <h3 class="animateFirst">Current Resourcepack Release</h3>
                    <h1 class="animateSecond">1.17+</h1>
                    <div class="button container-fluid justify-content-center animateThird">
                        <a href="#">Resourcepack Page</a>
                    </div>
                </div>
                <img data-src="../images/railyard.jpg" alt="" class="fit-img lozad">
            </div>
            <div class="container-fluid slide" id="apply">
                <div class="row mx-auto slide-content">
                    <h3 class="animateFirst">Help Us Build!</h3>
                    <h1 class="animateSecond">Apply Now</h1>
                    <div class="button container-fluid justify-content-center animateThird">
                        <a href="#">Application Form</a>
                    </div>
                </div>
                <img data-src="../images/MartyStation.jpg" alt="" class="fit-img lozad">
            </div>
        </div>
        <script type="text/javascript">
			// setHeaderAndFooter();
			const observer = lozad();
			observer.observe();
		</script>
    </body>

</html>
